<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reading block review</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="review">
    <div class="review-wrap">
      <header class="review-head">
        <span class="mark">Reading Block</span>
      </header>
      <h1 class="review-title">How did it go?</h1>
      <p class="review-intro" id="intro">
        Check off what you finished. Anything you leave unchecked goes back to your list for next
        time.
      </p>

      <ul class="review-list" id="review-list"></ul>

      <div class="review-foot">
        <button class="save-btn" id="done">Done</button>
      </div>
    </div>

    <script type="module" src="review.js"></script>
  </body>
</html>
